<!doctype html>
<html lang="fr">
<head>
 <meta charset="utf-8"/>
 <meta name="viewport" content="width=device-width,initial-scale=1"/>
 <title>RAPSOBOT PoC — UI</title>
 <link rel="stylesheet" href="style.css"/>
</head>

<body>
 <header class="gh-header">
   <div class="gh-header__left">
    <button id="menuBtn" class="icon-btn">☰</button>
    <a class="gh-brand" href="#dashboard">
     <img class="gh-brand__logo" src="logo.png"/>
     <span class="gh-brand__name">RAPSOBOT</span>
     <span class="gh-brand__sep">/</span>
     <span class="gh-brand__repo">rapsobot-poc</span>
    </a>
   </div>
   <div class="gh-header__center">
    <button id="runAnalysisBtnTop" class="gh-btn gh-btn--primary">Run analysis</button>
   </div>
   <div class="gh-header__right">
    <button id="resetBtnTop" class="gh-btn">Reset</button>
    <div id="runAnalysisMetaTop" class="gh-meta mono"></div>
    <div class="sys-status">
     <span class="sys-status__dot" id="sysDot"></span>
     <span class="sys-status__label" id="sysLabel">Idle</span>
     <span class="sys-status__meta" id="sysMeta">—</span>
    </div>
   </div>
  </header>

<!-- GLOBAL NAV OVERLAY -->
 <div id="globalNav" class="global-nav hidden">
  <div class="global-nav__panel">
   <h3>Navigation</h3>
   <a href="#dashboard">Dashboard</a>
   <a href="#projects">Projects</a>
  </div>
 </div>

<!-- MAIN APP CONTAINER -->
<main id="app"></main>
<!-- DETAILS MODAL (inchangé) -->
<div id="detailsModal" class="modal hidden">
  <div class="modal__inner">
    <div class="modal__head">
     <div class="modal__head-left">
      <div class="details-kicker mono">DÉTAILS</div>
      <div class="modal__title" id="detailsTitleModal"></div>
     </div>
     <div class="modal__head-right">
      <div class="details-meta mono" id="detailsMetaModal"></div>
      <button id="detailsClose" class="icon-btn icon-btn--sm">✕</button>
     </div>
  </div>
  <div class="modal__body" id="detailsBodyModal"></div>
 </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
