<!doctype html>
<html lang="fr">
<head>
 <meta charset="utf-8"/>
 <meta name="viewport" content="width=device-width,initial-scale=1"/>
 <title>Mdall</title>
 <link rel="icon" type="image/png" href="assets/images/logo.png"/>
 <link rel="stylesheet" href="style.css"/>
</head>

<body>
 <div id="globalHeaderHost"></div>
 <div id="projectStickyChromeHost"></div>
 <div id="globalNavHost"></div>

<!-- MAIN APP CONTAINER -->
<main id="app"></main>
<!-- DETAILS MODAL (inchangé) -->
<div id="detailsModal" class="modal overlay-host overlay-host--modal hidden" aria-hidden="true">
  <div class="modal__inner overlay-chrome overlay-chrome--modal" role="dialog" aria-modal="true" aria-label="Détails">
    <div class="overlay-chrome__head gh-panel__head gh-panel__head--tight details-head--expanded modal__head">
      <div class="overlay-chrome__bar">
        <div class="overlay-chrome__context">
          <div class="overlay-chrome__eyebrow mono">DÉTAILS</div>
          <div class="overlay-chrome__titlewrap" id="detailsTitleModal"></div>
        </div>

        <div class="overlay-chrome__actions">
          <div class="details-meta mono" id="detailsMetaModal"></div>
          <button id="detailsClose" class="icon-btn icon-btn--sm overlay-chrome__close" aria-label="Fermer">✕</button>
        </div>
      </div>
    </div>

    <div class="modal__body overlay-chrome__body" id="detailsBodyModal"></div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
