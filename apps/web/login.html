<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Connexion · Mdall</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <script>
    window.MDALL_CONFIG = window.MDALL_CONFIG || {};
    window.MDALL_CONFIG.supabaseUrl = window.MDALL_CONFIG.supabaseUrl || "https://olgxhfgdzyghlzxmremz.supabase.co";
    window.MDALL_CONFIG.supabaseAnonKey = window.MDALL_CONFIG.supabaseAnonKey || "sb_publishable_08nUL61_ATl-6KpD8dOYPw_RM5lMtEz";
    window.SUPABASE_URL = window.MDALL_CONFIG.supabaseUrl;
    window.SUPABASE_ANON_KEY = window.MDALL_CONFIG.supabaseAnonKey;
  </script>

  <main class="gh-page" style="min-height:100vh;display:grid;place-items:center;padding:24px;">
    <section class="gh-panel" style="width:min(420px,100%);padding:24px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
        <img src="assets/images/logo.png" alt="Mdall" style="width:40px;height:40px;object-fit:contain;">
        <div>
          <h1 style="margin:0;font-size:1.25rem;">Connexion à Mdall</h1>
          <p style="margin:4px 0 0;color:var(--fg-muted,#656d76);">Utilise ton compte Supabase Auth.</p>
        </div>
      </div>

      <label class="form-label" for="email">Email</label>
      <input id="email" class="form-input" type="email" placeholder="nom@exemple.com" autocomplete="email" />

      <label class="form-label" for="password" style="margin-top:12px;display:block;">Mot de passe</label>
      <input id="password" class="form-input" type="password" placeholder="Mot de passe" autocomplete="current-password" />

      <p id="loginMessage" style="min-height:24px;margin:12px 0 0;color:var(--danger-fg,#d1242f);"></p>
      <p id="loginHint" style="min-height:24px;margin:8px 0 0;color:var(--fg-muted,#656d76);font-size:12px;"></p>

      <div style="display:flex;gap:12px;margin-top:16px;">
        <button id="loginBtn" class="btn btn-primary" type="button">Se connecter</button>
        <button id="signupBtn" class="btn btn-secondary" type="button">Créer un compte</button>
      </div>
    </section>
  </main>

  <script type="module">
    import {
      getCurrentUser,
      getEmailRedirectUrl,
      isRateLimitError,
      redirectToAppHome,
      signIn,
      signUp,
      waitForSession
    } from './assets/js/auth.js'

    const emailInput = document.getElementById('email')
    const passwordInput = document.getElementById('password')
    const loginMessage = document.getElementById('loginMessage')
    const loginHint = document.getElementById('loginHint')
    const loginBtn = document.getElementById('loginBtn')
    const signupBtn = document.getElementById('signupBtn')

    const AUTH_RETRY_LOCK_KEY = 'mdall.auth.retry.lock.until'
    let isSubmitting = false

    function getCredentials() {
      return {
        email: String(emailInput?.value || '').trim(),
        password: String(passwordInput?.value || '')
      }
    }

    function getRetryLockUntil() {
      const raw = window.localStorage.getItem(AUTH_RETRY_LOCK_KEY)
      const value = Number(raw || 0)
      return Number.isFinite(value) ? value : 0
    }

    function setRetryLock(seconds) {
      const until = Date.now() + (Math.max(1, Number(seconds) || 1) * 1000)
      window.localStorage.setItem(AUTH_RETRY_LOCK_KEY, String(until))
      return until
    }

    function clearRetryLock() {
      window.localStorage.removeItem(AUTH_RETRY_LOCK_KEY)
    }

    function formatRemainingSeconds(until) {
      return Math.max(0, Math.ceil((until - Date.now()) / 1000))
    }

    function updateRetryHint() {
      const until = getRetryLockUntil()
      const remaining = formatRemainingSeconds(until)
      if (remaining > 0) {
        loginHint.textContent = `Trop de tentatives récentes. Attends environ ${remaining}s avant de réessayer.`
      } else {
        loginHint.textContent = ''
      }
    }

    function setBusy(isBusy) {
      const locked = formatRemainingSeconds(getRetryLockUntil()) > 0
      loginBtn.disabled = isBusy || locked
      signupBtn.disabled = isBusy || locked
      emailInput.disabled = isBusy
      passwordInput.disabled = isBusy
    }

    function setMessage(message, tone = 'error') {
      loginMessage.textContent = message || ''
      loginMessage.style.color = tone === 'success'
        ? 'var(--success-fg,#1a7f37)'
        : 'var(--danger-fg,#d1242f)'
    }

    async function redirectIfAlreadyAuthenticated() {
      const currentUser = await getCurrentUser()
      if (currentUser) {
        redirectToAppHome()
      }
    }

    function explainRateLimit(mode) {
      const actionLabel = mode === 'signup' ? 'création de compte' : 'connexion'
      return `Supabase bloque temporairement la ${actionLabel} car trop de tentatives ont été envoyées en peu de temps (erreur 429). Attends 60 secondes puis réessaie une seule fois. Si tu as déjà cliqué sur “Créer un compte”, vérifie d'abord dans Supabase > Authentication > Users si l'utilisateur existe déjà, puis utilise “Se connecter” au lieu de recréer le compte.`
    }

    async function handleAuth(mode) {
      updateRetryHint()
      if (isSubmitting) {
        return
      }

      const lockUntil = getRetryLockUntil()
      if (formatRemainingSeconds(lockUntil) > 0) {
        setBusy(false)
        setMessage('Réessaie après le délai indiqué ci-dessous.')
        updateRetryHint()
        return
      }

      setMessage('')
      const { email, password } = getCredentials()

      if (!email || !password) {
        setMessage('Saisis un email et un mot de passe.')
        return
      }

      isSubmitting = true
      setBusy(true)
      try {
        const result = mode === 'signup'
          ? await signUp(email, password, { emailRedirectTo: getEmailRedirectUrl() })
          : await signIn(email, password)

        if (result.error) {
          throw result.error
        }

        clearRetryLock()
        updateRetryHint()

        const session = result.data?.session || await waitForSession({ timeoutMs: 3000, intervalMs: 100 })

        if (session?.user) {
          redirectToAppHome()
          return
        }

        if (mode === 'signup' && result.data?.user) {
          setMessage(
            `Compte créé. Ouvre le mail de confirmation puis clique sur le lien le plus récent. La redirection doit revenir vers cette page : ${getEmailRedirectUrl()}`,
            'success'
          )
          return
        }

        throw new Error("Aucune session n'a été créée. Vérifie la configuration Supabase Auth (provider Email activé, confirmation email en dev).")
      } catch (error) {
        if (isRateLimitError(error)) {
          setRetryLock(60)
          updateRetryHint()
          setMessage(explainRateLimit(mode))
          return
        }
        setMessage(error?.message || 'Connexion impossible.')
      } finally {
        isSubmitting = false
        setBusy(false)
        updateRetryHint()
      }
    }

    loginBtn.addEventListener('click', () => handleAuth('login'))
    signupBtn.addEventListener('click', () => handleAuth('signup'))
    passwordInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault()
        handleAuth('login')
      }
    })

    window.setInterval(updateRetryHint, 1000)
    updateRetryHint()
    setBusy(false)

    redirectIfAlreadyAuthenticated().catch((error) => {
      console.error('login bootstrap failed', error)
    })
  </script>
</body>
</html>
