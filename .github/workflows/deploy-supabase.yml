name: Deploy Supabase

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Show Supabase CLI version
        run: supabase --version

      - name: Link to Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Push database migrations
        run: supabase db push --debug

      - name: Apply climate seed data
        run: |
          echo "Applying climate seed data..."
          DB_HOST="db.${SUPABASE_PROJECT_REF}.supabase.co"
          DB_DSN="host=${DB_HOST} port=5432 dbname=postgres user=postgres sslmode=require"

          DB_HOSTADDR="$(getent ahostsv4 "${DB_HOST}" | awk 'NR==1 { print $1 }' || true)"
          if [ -n "${DB_HOSTADDR}" ]; then
            echo "Using IPv4 ${DB_HOSTADDR} for ${DB_HOST}"
            DB_DSN="${DB_DSN} hostaddr=${DB_HOSTADDR}"
          else
            echo "IPv4 lookup unavailable for ${DB_HOST}; continuing with standard DNS resolution"
          fi
          for sql_file in \
            supabase/seed-data/climate/001_commune_canton_2014.sql \
            supabase/seed-data/climate/002_canton_2014_names.sql \
            supabase/seed-data/climate/003_current_canton_names.sql \
            supabase/seed-data/climate/004_snow_departments.sql \
            supabase/seed-data/climate/005_snow_canton_overrides.sql \
            supabase/seed-data/climate/006_wind_departments.sql \
            supabase/seed-data/climate/007_wind_canton_overrides.sql \
            supabase/seed-data/climate/008_frost_departments.sql; do
            echo "Applying $(basename "$sql_file")"
            PGPASSWORD="${SUPABASE_DB_PASSWORD}" psql "$DB_DSN" -v ON_ERROR_STOP=1 -f "$sql_file"
          done

          echo "Running climate seed verification..."
          PGPASSWORD="${SUPABASE_DB_PASSWORD}" psql "$DB_DSN" -v ON_ERROR_STOP=1 -f supabase/seed-data/climate/verify_climate_seed.sql

          snow_count="$(PGPASSWORD="${SUPABASE_DB_PASSWORD}" psql "$DB_DSN" -v ON_ERROR_STOP=1 -tA -c "SELECT COUNT(*) FROM public.mdall_climate_snow_departments;")"
          wind_count="$(PGPASSWORD="${SUPABASE_DB_PASSWORD}" psql "$DB_DSN" -v ON_ERROR_STOP=1 -tA -c "SELECT COUNT(*) FROM public.mdall_climate_wind_departments;")"
          frost_count="$(PGPASSWORD="${SUPABASE_DB_PASSWORD}" psql "$DB_DSN" -v ON_ERROR_STOP=1 -tA -c "SELECT COUNT(*) FROM public.mdall_climate_frost_departments;")"

          echo "snow_count=${snow_count}"
          echo "wind_count=${wind_count}"
          echo "frost_count=${frost_count}"

          if [ "$snow_count" = "0" ] || [ "$wind_count" = "0" ] || [ "$frost_count" = "0" ]; then
            echo "Climate seed verification failed: one or more core tables are empty."
            exit 1
          fi
          echo "Climate seed verification done"

      - name: Set Edge Function secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_HANDWRITING_MODEL: ${{ secrets.OPENAI_HANDWRITING_MODEL }}
          MATHPIX_APP_ID: ${{ secrets.MATHPIX_APP_ID }}
          MATHPIX_APP_KEY: ${{ secrets.MATHPIX_APP_KEY }}
          MYSCRIPT_APP_KEY: ${{ secrets.MYSCRIPT_APP_KEY }}
          GOOGLE_MAPS_EMBED_API_KEY: ${{ secrets.GOOGLE_MAPS_EMBED_API_KEY }}
        run: |
          ARGS=()
          [ -n "$SUPABASE_URL" ] && ARGS+=("SUPABASE_URL=$SUPABASE_URL")
          [ -n "$SUPABASE_ANON_KEY" ] && ARGS+=("SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY")
          [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && ARGS+=("SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY")
          [ -n "$OPENAI_API_KEY" ] && ARGS+=("OPENAI_API_KEY=$OPENAI_API_KEY")
          [ -n "$OPENAI_HANDWRITING_MODEL" ] && ARGS+=("OPENAI_HANDWRITING_MODEL=$OPENAI_HANDWRITING_MODEL")
          [ -n "$MATHPIX_APP_ID" ] && ARGS+=("MATHPIX_APP_ID=$MATHPIX_APP_ID")
          [ -n "$MATHPIX_APP_KEY" ] && ARGS+=("MATHPIX_APP_KEY=$MATHPIX_APP_KEY")
          [ -n "$MYSCRIPT_APP_KEY" ] && ARGS+=("MYSCRIPT_APP_KEY=$MYSCRIPT_APP_KEY")
          [ -n "$GOOGLE_MAPS_EMBED_API_KEY" ] && ARGS+=("GOOGLE_MAPS_EMBED_API_KEY=$GOOGLE_MAPS_EMBED_API_KEY")
          if [ "${#ARGS[@]}" -gt 0 ]; then
            supabase secrets set "${ARGS[@]}"
          else
            echo "No secrets provided for Edge Functions."
          fi

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy run-analysis --no-verify-jwt --debug
          supabase functions deploy extract-pdf-text --no-verify-jwt --debug
          supabase functions deploy generate-observations --no-verify-jwt --debug
          supabase functions deploy resolve-observations --no-verify-jwt --debug
          supabase functions deploy delete-account --no-verify-jwt --debug
          supabase functions deploy upload-subject-message-attachment --no-verify-jwt --debug
          supabase functions deploy subject-mdall-exchange --no-verify-jwt --debug
          supabase functions deploy recognize-handwritten-document --no-verify-jwt --debug
          supabase functions deploy google-maps-embed-url --no-verify-jwt --debug
          supabase functions deploy resolve-climate-tool --no-verify-jwt --debug
