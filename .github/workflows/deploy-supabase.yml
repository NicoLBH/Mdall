name: Deploy Supabase

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Show Supabase CLI version
        run: supabase --version

      - name: Link to Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Push database migrations
        run: supabase db push --debug

      - name: Set Edge Function secrets
        run: |
          supabase secrets set \
            SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} \
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy run-analysis --no-verify-jwt --debug
          supabase functions deploy extract-pdf-text --no-verify-jwt --debug
          supabase functions deploy generate-observations --no-verify-jwt --debug
          supabase functions deploy resolve-observations --no-verify-jwt --debug
          supabase functions deploy delete-account --no-verify-jwt --debug
          supabase functions deploy upload-subject-message-attachment --no-verify-jwt --debug
          supabase functions deploy subject-mdall-exchange --no-verify-jwt --debug
